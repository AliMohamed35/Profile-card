<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style/style.css" />
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  </head>
  <body>
    <div class="card">
      <div class="picture">
        <img src="images/profilepic.jpg" alt="image" />
      </div>
      <div class="text-data">
        <span class="name">Ali Mohamed</span>
        <span class="job">Front-end developer</span>
      </div>
      <div class="icons">
        <a href="#"
          ><img src="images/facebook_icon-icons.com_59205.png" alt=""
        /></a>
        <a href="#"
          ><img src="images/linkedin_icon-icons.com_65929.png" alt=""
        /></a>
        <a href="#"
          ><img src="images/1491580635-yumminkysocialmedia26_83102.png" alt=""
        /></a>
        <a href="#"
          ><img src="images/github-logo_icon-icons.com_73546.png" alt=""
        /></a>
      </div>
      <div class="buttons">
        <button>Subscribe</button>
        <button>Message</button>
      </div>
      <div class="analytics">
        <div class="data">
            <i class='bx bx-heart'></i>
            <span class="number1">60k</span>
        </div>
        <div class="data">
            <i class='bx bx-chat' ></i>
            <span class="number2">12k</span>
            </div>
        <div class="data">
            <i class='bx bx-share' ></i>
            <span class="number3">1.2k</span>
        </div>
      </div>
    </div>
  </body>
</html>
